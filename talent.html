<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Join the Network — Career One Stop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#ffffff; --muted:#6b7280; --black:#000; font-family: 'Inter', sans-serif; }
        body { margin:0; padding:0; text-align:center; }
        header { max-width:1200px; margin:20px auto; padding:0 20px; display:flex; justify-content:space-between; align-items:center; }
        .hero { padding:100px 20px; background:linear-gradient(to bottom, #fff, #f3f4f6); }
        .hero h1 { font-family:'Playfair Display', serif; font-size:60px; margin:0; }
        .btn-black { background:#06151a; color:#fff; padding:16px 32px; border-radius:12px; font-weight:700; display:inline-block; margin-top:30px; text-decoration:none; }
        .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:30px; max-width:1200px; margin:60px auto; padding:0 20px; }
        .item { background:#fff; border-radius:20px; overflow:hidden; border:1px solid #eee; text-align:left; transition: 0.3s; }
        .item:hover { transform: translateY(-10px); }
        .item img { width:100%; height:300px; object-fit:cover; }
        .content { padding:20px; }
        .role { font-size:12px; font-weight:800; color:#06a4a0; text-transform:uppercase; letter-spacing:1px; }
    </style>
</head>
<body>
    <header>
        <div style="font-size:24px; font-weight:800;">one.</div>
        <a href="index.html" style="text-decoration:none; color:var(--muted); font-weight:700;">For Companies</a>
    </header>

    <section class="hero">
        <h1>Join the talent network.</h1>
        <p>Get hand-introduced to hiring teams at top startups.</p>
        <a href="mailto:hiring@careeronestop.in" class="btn-black">Create your profile</a>
    </section>

    <div class="grid" id="talentGrid"></div>

    <script>
        const TALENTS = [
            {name:'Sanya', role:'Growth Lead', img:'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=500'},
            {name:'Vikram', role:'Video Editor', img:'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=500'},
            {name:'Ananya', role:'Sales Executive', img:'https://images.unsplash.com/photo-1580489944761-15a19d654956?w=500'},
            {name:'Kabir', role:'Product Designer', img:'https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=500'}
        ];
        const grid = document.getElementById('talentGrid');
        TALENTS.forEach(t => {
            grid.innerHTML += `
                <div class="item">
                    <img src="${t.img}">
                    <div class="content">
                        <span class="role">${t.role}</span>
                        <h3 style="margin:5px 0;">${t.name}</h3>
                    </div>
                </div>`;
        });
    </script>
</body>
</html>
