<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Career One Stop — Build Your India Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#ffffff; --muted:#6b7280; --black:#000; --accent:#06a4a0; font-family: 'Inter', sans-serif; }
        body { margin:0; background:var(--bg); color:var(--black); overflow-x:hidden; }
        a { text-decoration:none; color:inherit; }
        header { max-width:1200px; margin:20px auto; padding:0 20px; display:flex; justify-content:space-between; align-items:center; }
        nav { display:flex; gap:20px; align-items:center; }
        .btn-black { background:#06151a; color:#fff; padding:12px 24px; border-radius:12px; font-weight:700; }
        
        .hero { text-align:center; padding:80px 20px; }
        .kicker { display:inline-block; padding:8px 16px; border-radius:99px; background:linear-gradient(90deg,#f7ead6,#efe2f0); font-weight:700; font-size:14px; margin-bottom:20px; }
        .hero h1 { font-family:'Playfair Display', serif; font-size:clamp(40px, 8vw, 80px); line-height:1; margin:0 0 20px; }
        .hero p { max-width:700px; margin:0 auto 30px; color:var(--muted); font-size:18px; line-height:1.6; }
        
        .avatars { display:flex; justify-content:center; margin-top:40px; position:relative; height:100px; }
        .av { width:70px; height:70px; border-radius:50%; border:4px solid #fff; box-shadow:0 10px 20px rgba(0,0,0,0.1); overflow:hidden; position:absolute; }
        .av img { width:100%; height:100%; object-fit:cover; }
        
        .talent-section { padding:60px 0; background:#f9fafb; }
        .talent-row { display:flex; gap:20px; overflow-x:auto; padding:20px 40px; scrollbar-width:none; }
        .card { min-width:300px; background:#fff; border-radius:20px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.05); position:relative; }
        .card img { width:100%; height:350px; object-fit:cover; }
        .card-overlay { position:absolute; bottom:0; left:0; right:0; padding:20px; background:linear-gradient(transparent, rgba(0,0,0,0.8)); color:#fff; }
        .badge { font-size:12px; background:rgba(255,255,255,0.2); padding:4px 8px; border-radius:6px; backdrop-filter:blur(4px); }
    </style>
</head>
<body>
    <header>
        <div style="font-size:24px; font-weight:800; color:var(--accent);">one.</div>
        <nav>
            <a href="index.html" style="font-weight:700;">For Companies</a>
            <a href="talent.html" style="color:var(--muted);">For Talent</a>
            <a href="#hire" class="btn-black">Hire Talent</a>
        </nav>
    </header>

    <section class="hero">
        <div class="kicker">Trusted by remote-first startups</div>
        <h1>Build your India team — <br><em>fast, vetted, reliable.</em></h1>
        <p>We source, screen, and deliver interview-ready candidates across sales, product, marketing, and operations.</p>
        <a href="mailto:hiring@careeronestop.in" class="btn-black">Book a hiring call</a>
        
        <div class="avatars">
            <div class="av" style="left:35%"><img src="https://i.pravatar.cc/150?u=a"></div>
            <div class="av" style="left:42%; z-index:2; width:85px; height:85px; top:-10px;"><img src="https://i.pravatar.cc/150?u=b"></div>
            <div class="av" style="left:52%"><img src="https://i.pravatar.cc/150?u=c"></div>
        </div>
    </section>

    <section class="talent-section">
        <h2 style="text-align:center; margin-bottom:40px;">Featured Talent</h2>
        <div class="talent-row" id="talentHome"></div>
    </section>

    <script>
        const TALENT = [
            {name:'Arjun', role:'Product Manager', img:'https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=600'},
            {name:'Priya', role:'UX Designer', img:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=600'},
            {name:'Rohan', role:'Backend Engineer', img:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=600'}
        ];
        const container = document.getElementById('talentHome');
        TALENT.forEach(t => {
            container.innerHTML += `
                <div class="card">
                    <img src="${t.img}">
                    <div class="card-overlay">
                        <span class="badge">${t.role}</span>
                        <h3 style="margin:10px 0 0;">${t.name}</h3>
                    </div>
                </div>`;
        });
    </script>
</body>
</html>
